name: uCritAir
options:
  bundleIdPrefix: com.ucritter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""

targets:
  uCritAir:
    type: application
    platform: iOS
    sources:
      - path: uCritAir
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ucritter.ucritair
        INFOPLIST_FILE: uCritAir/App/Info.plist
        SWIFT_STRICT_CONCURRENCY: targeted
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Release:
          GCC_TREAT_WARNINGS_AS_ERRORS: YES
          SWIFT_STRICT_CONCURRENCY: minimal
          SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    info:
      path: uCritAir/App/Info.plist
      properties:
        CFBundleName: uCritAir
        CFBundleDisplayName: uCritAir
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSBluetoothAlwaysUsageDescription: "uCritAir needs Bluetooth to connect to your air quality monitor."
        ITSAppUsesNonExemptEncryption: false
        UIRequiredDeviceCapabilities:
          - bluetooth-le

  uCritAirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: uCritAirTests
    dependencies:
      - target: uCritAir
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ucritter.ucritair.tests
        GENERATE_INFOPLIST_FILE: "YES"
